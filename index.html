<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PARISI — Bathware</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --gold: #c9a55a;
  --gold-light: #e2c07a;
  --gold-dark: #9c7a3c;
  --bg: #0d0c0b;
  --surface: rgba(20,18,15,0.92);
  --surface2: rgba(30,27,22,0.95);
  --border-gold: rgba(201,165,90,0.4);
  --border-gold-focus: rgba(201,165,90,0.85);
  --text: #f0e8d8;
  --text-muted: rgba(201,165,90,0.55);
  --green: #7cad6e;
  --red: #c97070;
  --yellow: #c9a55a;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Montserrat', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

/* ════════════════════════════
   HOME SCREEN
════════════════════════════ */
#homeScreen {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.home-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 70% 15%, rgba(180,140,60,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 80%, rgba(140,110,50,0.08) 0%, transparent 45%),
    linear-gradient(160deg, #1a1610 0%, #0d0c0a 40%, #080807 100%);
  z-index: 0;
}

/* Decorative lines (fluted wall effect) */
.home-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    90deg,
    rgba(201,165,90,0.03) 0px,
    rgba(201,165,90,0.03) 1px,
    transparent 1px,
    transparent 28px
  );
}

.home-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  padding: 0 32px;
  gap: 0;
}

/* Logo */
.logo-wrap {
  text-align: center;
  margin-bottom: 48px;
}
.logo-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(52px, 14vw, 80px);
  font-weight: 300;
  letter-spacing: 0.22em;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 60px rgba(201,165,90,0.2);
}
.logo-sub {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(9px, 2.5vw, 12px);
  font-weight: 500;
  letter-spacing: 0.45em;
  color: rgba(201,165,90,0.7);
  margin-top: 8px;
  text-transform: uppercase;
}
.logo-line {
  width: 36px;
  height: 1px;
  background: var(--gold);
  margin: 10px auto 0;
  opacity: 0.6;
}

/* Home Search Bar */
.home-search-wrap {
  width: 100%;
  max-width: 420px;
}
.home-search-box {
  display: flex;
  align-items: center;
  background: transparent;
  border: 1.5px solid var(--border-gold);
  border-radius: 50px;
  padding: 0 6px 0 20px;
  height: 56px;
  gap: 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.home-search-box:focus-within {
  border-color: var(--border-gold-focus);
  box-shadow: 0 0 30px rgba(201,165,90,0.12), inset 0 0 20px rgba(201,165,90,0.04);
}
.home-search-icon {
  color: var(--gold);
  flex-shrink: 0;
  opacity: 0.8;
}
.home-divider {
  width: 1px;
  height: 22px;
  background: var(--border-gold);
  flex-shrink: 0;
  margin: 0 4px;
}
#homeInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 0.04em;
  caret-color: var(--gold);
}
#homeInput::placeholder { color: rgba(201,165,90,0.45); letter-spacing: 0.05em; }
.home-search-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(201,165,90,0.15);
  border: 1px solid var(--border-gold);
  color: var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}
.home-search-btn:hover, .home-search-btn:active {
  background: rgba(201,165,90,0.28);
  border-color: var(--gold);
}

/* ════════════════════════════
   RESULTS SCREEN
════════════════════════════ */
#resultsScreen {
  min-height: 100vh;
  display: none;
  flex-direction: column;
  background: var(--bg);
}

/* Top bar on results */
.results-topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(13,12,11,0.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(201,165,90,0.15);
  padding: 12px 16px;
}
.results-topbar-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: 640px;
  margin: 0 auto;
}
.back-btn {
  background: none;
  border: none;
  color: var(--gold);
  cursor: pointer;
  padding: 6px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  opacity: 0.8;
  transition: opacity 0.15s;
}
.back-btn:hover { opacity: 1; }
.topbar-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.18em;
  color: var(--gold);
  flex-shrink: 0;
}
.topbar-search {
  flex: 1;
  display: flex;
  align-items: center;
  background: rgba(201,165,90,0.06);
  border: 1px solid var(--border-gold);
  border-radius: 50px;
  padding: 0 14px;
  height: 40px;
  gap: 8px;
}
#topbarInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  font-weight: 400;
  caret-color: var(--gold);
}
#topbarInput::placeholder { color: var(--text-muted); }

/* Results meta */
.results-meta {
  max-width: 640px;
  margin: 0 auto;
  padding: 12px 16px 4px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(201,165,90,0.4);
}

/* Results list */
.results-list {
  max-width: 640px;
  margin: 0 auto;
  width: 100%;
  padding: 4px 16px 80px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── CARD ── */
.card {
  background: rgba(20,18,14,0.9);
  border: 1px solid rgba(201,165,90,0.2);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover { border-color: rgba(201,165,90,0.5); }
.card.expanded {
  border-color: rgba(201,165,90,0.55);
  box-shadow: 0 4px 30px rgba(201,165,90,0.08);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 14px;
}
.card-code {
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  background: rgba(201,165,90,0.1);
  border: 1px solid rgba(201,165,90,0.25);
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}
.card-title {
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.01em;
}
.card-title.no-info { color: rgba(201,165,90,0.35); font-style: italic; font-size: 12px; }
.card-location {
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: rgba(201,165,90,0.7);
  background: rgba(201,165,90,0.08);
  border: 1px solid rgba(201,165,90,0.2);
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.06em;
}
.card-chevron {
  color: rgba(201,165,90,0.35);
  flex-shrink: 0;
  transition: transform 0.2s;
}
.card.expanded .card-chevron { transform: rotate(180deg); }

/* Expanded detail */
.card-detail {
  display: none;
  border-top: 1px solid rgba(201,165,90,0.12);
  padding: 14px;
  flex-direction: column;
  gap: 8px;
  animation: fadeIn 0.18s ease;
}
.card.expanded .card-detail { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.detail-item {
  background: rgba(201,165,90,0.04);
  border: 1px solid rgba(201,165,90,0.1);
  border-radius: 9px;
  padding: 10px 12px;
}
.detail-item.full { grid-column: 1 / -1; }
.detail-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(201,165,90,0.4);
  margin-bottom: 4px;
}
.detail-value {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.01em;
}
.detail-value.location-val {
  font-size: 16px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.12em;
}
.detail-value.stock-pos { color: var(--green); }
.detail-value.stock-zero { color: rgba(201,165,90,0.4); }
.detail-value.stock-neg { color: var(--red); }

/* Status badge */
.status-pill {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
}
.status-stocked    { background: rgba(124,173,110,0.12); color: var(--green); border: 1px solid rgba(124,173,110,0.25); }
.status-nonstocked { background: rgba(201,165,90,0.1);  color: var(--gold);  border: 1px solid rgba(201,165,90,0.25); }
.status-superseded { background: rgba(201,112,112,0.1); color: var(--red);   border: 1px solid rgba(201,112,112,0.25); }
.status-unknown    { background: rgba(201,165,90,0.05); color: rgba(201,165,90,0.4); border: 1px solid rgba(201,165,90,0.12); }

/* Empty / no results */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.5; }
.empty-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--gold); margin-bottom: 8px; }
.empty-state p { font-size: 13px; color: rgba(201,165,90,0.4); font-weight: 300; }

/* ════ TRANSITIONS ════ */
#homeScreen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(-12px);
}
#resultsScreen.visible { display: flex; }

/* Desktop adjustments */
@media (min-width: 768px) {
  .home-bg::before { background-image: repeating-linear-gradient(90deg, rgba(201,165,90,0.025) 0px, rgba(201,165,90,0.025) 1px, transparent 1px, transparent 40px); }
  .logo-main { font-size: 90px; }
}

/* ════════════════════════════
   AUTOCOMPLETE DROPDOWN
════════════════════════════ */
.autocomplete-wrap {
  position: relative;
  width: 100%;
}
.autocomplete-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  left: 0; right: 0;
  background: rgba(18,16,12,0.98);
  border: 1px solid rgba(201,165,90,0.3);
  border-radius: 14px;
  overflow: hidden;
  z-index: 999;
  box-shadow: 0 16px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,165,90,0.08);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: none;
  flex-direction: column;
  max-height: 320px;
  overflow-y: auto;
}
.autocomplete-dropdown.open { display: flex; }

/* Scrollbar styling */
.autocomplete-dropdown::-webkit-scrollbar { width: 3px; }
.autocomplete-dropdown::-webkit-scrollbar-track { background: transparent; }
.autocomplete-dropdown::-webkit-scrollbar-thumb { background: rgba(201,165,90,0.25); border-radius: 3px; }

.ac-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(201,165,90,0.07);
  transition: background 0.12s;
  min-height: 48px;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.active { background: rgba(201,165,90,0.08); }

.ac-code {
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 80px;
}
.ac-code mark {
  background: rgba(201,165,90,0.22);
  color: var(--gold-light);
  border-radius: 3px;
  padding: 0 1px;
  font-weight: 700;
}
.ac-desc {
  font-size: 12px;
  font-weight: 300;
  color: rgba(240,232,216,0.6);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}
.ac-loc {
  font-size: 11px;
  font-weight: 500;
  color: rgba(201,165,90,0.45);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.06em;
}
.ac-divider {
  padding: 6px 16px 5px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(201,165,90,0.3);
  border-bottom: 1px solid rgba(201,165,90,0.07);
}

/* Topbar autocomplete wraps around .topbar-search */
.topbar-ac-wrap {
  position: relative;
  flex: 1;
}
.topbar-ac-wrap .autocomplete-dropdown {
  top: calc(100% + 6px);
  border-radius: 12px;
}

/* ════════════════════════════
   BARCODE SCANNER
════════════════════════════ */
#scannerOverlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: #000;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#scannerOverlay.open { display: flex; }

.scanner-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 20px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
  z-index: 10;
}
.scanner-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  letter-spacing: 0.12em;
  color: var(--gold);
}
.scanner-close {
  background: rgba(201,165,90,0.15);
  border: 1px solid rgba(201,165,90,0.35);
  color: var(--gold);
  border-radius: 50%;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: background 0.2s;
}
.scanner-close:hover { background: rgba(201,165,90,0.28); }

#scannerVideo {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.scanner-frame-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.scanner-frame {
  width: min(80vw, 340px);
  height: 160px;
  position: relative;
}
/* Corner brackets */
.scanner-frame::before, .scanner-frame::after,
.scanner-frame .corner-br, .scanner-frame .corner-bl {
  content: '';
  position: absolute;
  width: 28px; height: 28px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0.9;
}
.scanner-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.scanner-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.scanner-frame .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
.scanner-frame .corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

/* Scanning line animation */
.scan-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  box-shadow: 0 0 8px rgba(201,165,90,0.8);
  animation: scanMove 2s ease-in-out infinite;
  top: 0;
}
@keyframes scanMove {
  0%   { top: 0%; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

.scanner-hint {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 0 20px 48px;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  text-align: center;
}
.scanner-hint p {
  font-size: 13px;
  color: rgba(201,165,90,0.6);
  font-weight: 300;
  letter-spacing: 0.04em;
}
.scanner-result-toast {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,18,14,0.97);
  border: 1px solid rgba(201,165,90,0.4);
  border-radius: 12px;
  padding: 12px 20px;
  text-align: center;
  display: none;
  min-width: 220px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.scanner-result-toast.visible { display: block; }
.toast-code {
  font-size: 16px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.08em;
  margin-bottom: 3px;
}
.toast-desc {
  font-size: 12px;
  color: rgba(240,232,216,0.6);
  font-weight: 300;
}

/* Scan button on home and topbar */
.scan-btn {
  background: rgba(201,165,90,0.1);
  border: 1px solid rgba(201,165,90,0.3);
  border-radius: 50%;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--gold);
  transition: background 0.2s;
  flex-shrink: 0;
}
.scan-btn:hover { background: rgba(201,165,90,0.22); }
.home-scan-btn {
  margin-top: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  color: rgba(201,165,90,0.5);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid rgba(201,165,90,0.2);
  border-radius: 50px;
  padding: 10px 20px;
  transition: color 0.2s, border-color 0.2s;
}
.home-scan-btn:hover { color: var(--gold); border-color: rgba(201,165,90,0.45); }

</style>
</head>
<body>

<!-- ══ HOME SCREEN ══ -->
<div id="homeScreen">
  <div class="home-bg"></div>
  <div class="home-content">
    <div class="logo-wrap">
      <div class="logo-main">PARISI</div>
      <div class="logo-sub">Bathware</div>
      <div class="logo-line"></div>
    </div>
    <div class="home-search-wrap autocomplete-wrap" id="homeAcWrap">
      <div class="home-search-box">
        <svg class="home-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="homeInput" type="search" placeholder="Digite o código do produto" autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="home-divider"></div>
        <button class="home-search-btn" id="homeSearchBtn" aria-label="Pesquisar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div class="autocomplete-dropdown" id="homeDropdown"></div>

    <div class="home-scan-btn" onclick="openScanner()" style="margin-top:16px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
        <rect x="7" y="7" width="10" height="10" rx="1"/>
      </svg>
      Escanear etiqueta
    </div>
    </div>
  </div>
</div>

<!-- ══ RESULTS SCREEN ══ -->
<div id="resultsScreen">
  <div class="results-topbar">

const index = PRODUCTS.map(p => ({
  ...p,
  _s: (p.code + ' ' + p.description + ' ' + p.category + ' ' + p.location).toLowerCase()
}));

// ── DOM refs ──
const homeScreen    = document.getElementById('homeScreen');
const resultsScreen = document.getElementById('resultsScreen');
const homeInput     = document.getElementById('homeInput');
const homeSearchBtn = document.getElementById('homeSearchBtn');
const backBtn       = document.getElementById('backBtn');
const topbarInput   = document.getElementById('topbarInput');
const resultsList   = document.getElementById('resultsList');
const resultsMeta   = document.getElementById('resultsMeta');

let expandedCode = null;

// ── Navigate ──
function goResults(query) {
  homeScreen.classList.add('hidden');
  resultsScreen.classList.add('visible');
  topbarInput.value = query;
  render(query);
  topbarInput.focus();
  window.scrollTo(0, 0);
}

function goHome() {
  homeScreen.classList.remove('hidden');
  resultsScreen.classList.remove('visible');
  homeInput.value = topbarInput.value;
  expandedCode = null;
  setTimeout(() => homeInput.focus(), 300);
}

// ── Home search ──
homeSearchBtn.addEventListener('click', () => {
  const q = homeInput.value.trim();
  if (q) goResults(q);
});
homeInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = homeInput.value.trim();
    if (q) goResults(q);
  }
});

// ── Back ──
backBtn.addEventListener('click', goHome);

// ── Topbar live search ──
topbarInput.addEventListener('input', () => {
  expandedCode = null;
  render(topbarInput.value.trim());
});

// ── Helpers ──
function statusClass(s) {
  if (!s) return 'status-unknown';
  const l = s.toLowerCase();
  if (l.includes('superseded')) return 'status-superseded';
  if (l === 'stocked') return 'status-stocked';
  if (l.includes('non') || l.includes('not')) return 'status-nonstocked';
  return 'status-unknown';
}
function stockClass(v) {
  const n = parseInt(v);
  if (isNaN(n)) return '';
  return n > 0 ? 'stock-pos' : n === 0 ? 'stock-zero' : 'stock-neg';
}

// ── Render ──
function render(query) {
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  const matches = terms.length ? index.filter(p => terms.every(t => p._s.includes(t))) : [];

  if (!matches.length) {
    resultsMeta.textContent = '';
    resultsList.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <h3>${query ? 'Nenhum produto encontrado' : 'Pesquise um produto'}</h3>
        <p>${query ? 'Tente outro código ou descrição.' : 'Digite o código ou nome do produto acima.'}</p>
      </div>`;
    return;
  }

  // Sort: exact code first, then starts-with
  const q = query.toLowerCase();
  matches.sort((a, b) => {
    const rank = p => p.code.toLowerCase() === q ? 0 : p.code.toLowerCase().startsWith(q) ? 1 : 2;
    return rank(a) - rank(b);
  });

  const shown = matches.slice(0, 100);
  const extra = matches.length > 100 ? ' — primeiros 100' : '';
  resultsMeta.textContent = `${matches.length} produto${matches.length !== 1 ? 's' : ''} encontrado${matches.length !== 1 ? 's' : ''}${extra}`;

  resultsList.innerHTML = shown.map(p => {
    const hasInfo = p.matched === 'MATCHED' && p.description;
    const isExp   = expandedCode === p.code;

    let detailHTML = '';
    if (hasInfo) {
      const sCls  = statusClass(p.status);
      const stCls = stockClass(p.stock);
      detailHTML = `
        <div class="detail-grid">
          <div class="detail-item full">
            <div class="detail-label">Localização — Shelf</div>
            <div class="detail-value location-val">${p.location || '—'}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Status</div>
            <div class="detail-value"><span class="status-pill ${sCls}">${p.status || '—'}</span></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Estoque</div>
            <div class="detail-value ${stCls}">${p.stock !== '' ? p.stock + ' un.' : '—'}</div>
          </div>
          ${p.category ? `<div class="detail-item full"><div class="detail-label">Categoria</div><div class="detail-value" style="font-size:12px;font-weight:400">${p.category}</div></div>` : ''}
          ${p.description ? `<div class="detail-item full"><div class="detail-label">Descrição completa</div><div class="detail-value" style="font-size:12px;font-weight:400;white-space:normal;line-height:1.5">${p.description}</div></div>` : ''}
        </div>`;
    } else {
      detailHTML = `
        <div class="detail-grid">
          <div class="detail-item full">
            <div class="detail-label">Localização — Shelf</div>
            <div class="detail-value location-val">${p.location || '—'}</div>
          </div>
          <div class="detail-item full" style="border-color:rgba(201,165,90,0.08)">
            <div class="detail-label">Observação</div>
            <div class="detail-value" style="font-size:12px;font-weight:300;color:rgba(201,165,90,0.35)">Sem informações adicionais disponíveis para este produto.</div>
          </div>
        </div>`;
    }

    const codeEsc = p.code.replace(/'/g, "\'");
    return `
      <div class="card ${isExp ? 'expanded' : ''}" data-code="${p.code}" onclick="toggle('${codeEsc}')">
        <div class="card-header">
          <span class="card-code">${p.code}</span>
          <span class="card-title ${hasInfo ? '' : 'no-info'}">${hasInfo ? p.description : 'Apenas localização'}</span>
          <span class="card-location">${p.location}</span>
          <svg class="card-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="card-detail">${detailHTML}</div>
      </div>`;
  }).join('');
}

const MAX_SUGGESTIONS = 8;

function getSuggestions(query) {
  if (!query || query.length < 2) return [];
  const q = query.toLowerCase();
  const terms = q.split(/\s+/).filter(Boolean);

  // Priority: code starts-with first, then description contains
  const codeStarts = [];
  const codeContains = [];
  const descContains = [];

  for (const p of index) {
    const codeL = p.code.toLowerCase();
    if (codeL.startsWith(q)) { codeStarts.push(p); continue; }
    if (terms.every(t => codeL.includes(t))) { codeContains.push(p); continue; }
    if (terms.every(t => p._s.includes(t))) descContains.push(p);
  }

  return [...codeStarts, ...codeContains, ...descContains].slice(0, MAX_SUGGESTIONS);
}

function highlightCode(code, query) {
  const q = query.toLowerCase();
  const idx = code.toLowerCase().indexOf(q);
  if (idx === -1) return code;
  return code.slice(0, idx) + '<mark>' + code.slice(idx, idx + q.length) + '</mark>' + code.slice(idx + q.length);
}

function renderDropdown(dropdown, suggestions, query, onSelect) {
  if (!suggestions.length) {
    dropdown.classList.remove('open');
    return;
  }
  dropdown.innerHTML = suggestions.map((p, i) => {
    const hasDesc = p.matched === 'MATCHED' && p.description;
    const desc = hasDesc ? p.description : '<span style="opacity:0.4;font-style:italic">Apenas localização</span>';
    return `<div class="ac-item" data-idx="${i}" role="option">
      <span class="ac-code">${highlightCode(p.code, query)}</span>
      <span class="ac-desc">${desc}</span>
      <span class="ac-loc">${p.location}</span>
    </div>`;
  }).join('');
  dropdown.classList.add('open');

  // Click on suggestion
  dropdown.querySelectorAll('.ac-item').forEach((el, i) => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      onSelect(suggestions[i]);
    });
    el.addEventListener('touchend', e => {
      e.preventDefault();
      onSelect(suggestions[i]);
    });
  });
}

function closeAllDropdowns() {
  document.getElementById('homeDropdown').classList.remove('open');
  document.getElementById('topbarDropdown').classList.remove('open');
}

// ── Home autocomplete ──
homeInput.addEventListener('input', () => {
  const q = homeInput.value.trim();
  const sugg = getSuggestions(q);
  renderDropdown(
    document.getElementById('homeDropdown'),
    sugg, q,
    (p) => {
      homeInput.value = p.code;
      closeAllDropdowns();
      goResults(p.code);
    }
  );
});

homeInput.addEventListener('blur', () => {
  setTimeout(() => document.getElementById('homeDropdown').classList.remove('open'), 150);
});

homeInput.addEventListener('focus', () => {
  const q = homeInput.value.trim();
  if (q.length >= 2) {
    const sugg = getSuggestions(q);
    renderDropdown(document.getElementById('homeDropdown'), sugg, q, (p) => {
      homeInput.value = p.code;
      closeAllDropdowns();
      goResults(p.code);
    });
  }
});

// ── Topbar autocomplete ──
topbarInput.addEventListener('input', () => {
  const q = topbarInput.value.trim();
  const sugg = getSuggestions(q);
  renderDropdown(
    document.getElementById('topbarDropdown'),
    sugg, q,
    (p) => {
      topbarInput.value = p.code;
      closeAllDropdowns();
      expandedCode = null;
      render(p.code);
    }
  );
  // also update results live
  expandedCode = null;
  render(q);
});

topbarInput.addEventListener('blur', () => {
  setTimeout(() => document.getElementById('topbarDropdown').classList.remove('open'), 150);
});

topbarInput.addEventListener('focus', () => {
  const q = topbarInput.value.trim();
  if (q.length >= 2) {
    const sugg = getSuggestions(q);
    renderDropdown(document.getElementById('topbarDropdown'), sugg, q, (p) => {
      topbarInput.value = p.code;
      closeAllDropdowns();
      expandedCode = null;
      render(p.code);
    });
  }
});


// ════════════════════════════
//   BARCODE SCANNER — Dynamsoft via CDN (máxima compatibilidade)
// ════════════════════════════

let scannerStream = null;
let scannerActive = false;
let scannerAnimFrame = null;
let lastScanned = null;
let toastTimeout = null;

// ── Carrega script dinamicamente ──
function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function openScanner() {
  document.getElementById('scannerOverlay').classList.add('open');
  scannerActive = true;
  // Carrega ZXing via jsDelivr (funciona em qualquer browser)
  loadScript('https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.1/umd/index.min.js')
    .then(() => loadScript('https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js'))
    .catch(() => {})
    .finally(() => startScanner());
}

function closeScanner() {
  scannerActive = false;
  document.getElementById('scannerOverlay').classList.remove('open');
  stopScanner();
}

function stopScanner() {
  if (scannerAnimFrame) { cancelAnimationFrame(scannerAnimFrame); scannerAnimFrame = null; }
  if (scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
  const video = document.getElementById('scannerVideo');
  video.srcObject = null;
}

async function startScanner() {
  const video = document.getElementById('scannerVideo');

  // Tenta câmera primeiro
  try {
    scannerStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = scannerStream;
    await video.play();
  } catch(e) {
    if (e.name === 'NotAllowedError') {
      showToast('📵 Câmera bloqueada', 'Permita o acesso à câmera');
    } else {
      showToast('Erro', 'Câmera não disponível');
    }
    return;
  }

  // Tenta BarcodeDetector nativo (Chrome Android/desktop)
  if ('BarcodeDetector' in window) {
    try {
      const bd = new BarcodeDetector({ formats: ['code_128','ean_13','ean_8','code_39','qr_code'] });
      const nativeLoop = async () => {
        if (!scannerActive) return;
        if (video.readyState >= 2) {
          try {
            const results = await bd.detect(video);
            if (results.length) { handleRaw(results[0].rawValue); return; }
          } catch(e) {}
        }
        scannerAnimFrame = requestAnimationFrame(nativeLoop);
      };
      nativeLoop();
      return;
    } catch(e) {}
  }

  // Fallback: ZXing se carregado
  if (typeof ZXingBrowser !== 'undefined' || typeof ZXing !== 'undefined') {
    startZxing(video);
    return;
  }

  // Fallback final: canvas frame capture manual
  startCanvasScanner(video);
}

function startZxing(video) {
  try {
    const Lib = typeof ZXingBrowser !== 'undefined' ? ZXingBrowser : ZXing;
    const reader = new Lib.BrowserMultiFormatReader();
    reader.decodeFromVideoElement(video, (result, err) => {
      if (!scannerActive) return;
      if (result) handleRaw(result.getText());
    });
  } catch(e) {
    startCanvasScanner(video);
  }
}

// Canvas fallback: captura frames e envia para API de visão se disponível
// ou usa input manual como último recurso
function startCanvasScanner(video) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  let frameCount = 0;

  const loop = async () => {
    if (!scannerActive) return;
    if (video.readyState >= 2) {
      frameCount++;
      // A cada 15 frames tenta detectar via BarcodeDetector (pode ter sido carregado depois)
      if (frameCount % 15 === 0 && 'BarcodeDetector' in window) {
        try {
          const bd = new BarcodeDetector({ formats: ['code_128','ean_13','ean_8','code_39','qr_code'] });
          const r = await bd.detect(video);
          if (r.length) { handleRaw(r[0].rawValue); return; }
        } catch(e) {}
      }
    }
    scannerAnimFrame = requestAnimationFrame(loop);
  };
  loop();

  // Mostra input manual após 4 segundos sem leitura
  setTimeout(() => {
    if (scannerActive && !lastScanned) {
      showManualInput();
    }
  }, 4000);
}

function showManualInput() {
  const hint = document.querySelector('.scanner-hint');
  hint.innerHTML = `
    <p style="margin-bottom:10px;color:rgba(201,165,90,0.7)">Scanner não disponível neste browser.<br>Digite o código manualmente:</p>
    <div style="display:flex;gap:8px;justify-content:center;padding:0 20px">
      <input id="manualCodeInput" type="text" placeholder="Ex: QQ.RH.L.46"
        style="flex:1;background:rgba(20,18,14,0.95);border:1px solid rgba(201,165,90,0.4);border-radius:8px;
               padding:10px 14px;color:#f0e8d8;font-family:Montserrat,sans-serif;font-size:14px;
               outline:none;caret-color:#c9a55a;max-width:220px"
        autocomplete="off" autocorrect="off" spellcheck="false">
      <button onclick="submitManual()"
        style="background:rgba(201,165,90,0.18);border:1px solid rgba(201,165,90,0.4);border-radius:8px;
               padding:10px 16px;color:#c9a55a;font-family:Montserrat,sans-serif;font-size:13px;
               font-weight:600;cursor:pointer;letter-spacing:0.05em">
        OK
      </button>
    </div>`;
  const inp = document.getElementById('manualCodeInput');
  if (inp) {
    inp.focus();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitManual(); });
  }
}

function submitManual() {
  const inp = document.getElementById('manualCodeInput');
  if (!inp) return;
  const val = inp.value.trim().toUpperCase();
  if (val) handleRaw(val);
}

function handleRaw(raw) {
  const normalized = raw.trim().toUpperCase().replace(/\s+/g, '');
  if (normalized === lastScanned) return;
  lastScanned = normalized;

  let product = index.find(p => p.code.toUpperCase() === normalized);
  if (!product) {
    product = index.find(p =>
      normalized.includes(p.code.toUpperCase()) ||
      p.code.toUpperCase().includes(normalized)
    );
  }

  if (product) {
    if (navigator.vibrate) navigator.vibrate([60, 30, 60]);
    const hasInfo = product.matched === 'MATCHED' && product.description;
    showToast(product.code, hasInfo ? product.description : '📍 ' + product.location);
    setTimeout(() => {
      closeScanner();
      expandedCode = product.code;
      if (resultsScreen.classList.contains('visible')) {
        topbarInput.value = product.code;
        render(product.code);
      } else {
        goResults(product.code);
      }
    }, 1100);
  } else {
    showToast('Não encontrado', normalized.length > 22 ? normalized.slice(0,22)+'…' : normalized);
    setTimeout(() => { lastScanned = null; }, 2000);
  }
}

function showToast(code, desc) {
  const toast = document.getElementById('scannerToast');
  document.getElementById('toastCode').textContent = code;
  document.getElementById('toastDesc').textContent = desc;
  toast.classList.add('visible');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('visible'), 2500);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && scannerActive) closeScanner();
});

function toggle(code) {
  expandedCode = expandedCode === code ? null : code;
  render(topbarInput.value.trim());
}
</script>
